<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <h2>University Admission Portal</h2>
        <div>
            <a href="/">Apply Now</a>
            <a href="/admin" class="btn">Admin Panel</a>
        </div>
    </nav>
    <main>
        <div class="form-container">
            <h3>Undergraduate Admission Form</h3>
            <p style="color: #666; margin-bottom: 20px;">Please fill out your details carefully to apply.</p>
            
            <form action="/api/apply" method="POST">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>

                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>

                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="1234567890" required>

                <label>Desired Course</label>
                <select name="course" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="">-- Select Course --</option>
                    <option value="Computer Science">B.Tech Computer Science</option>
                    <option value="Information Technology">B.Tech Information Technology</option>
                    <option value="Business Administration">BBA (Business Administration)</option>
                    <option value="Data Science">B.Sc Data Science</option>
                </select>

                <label>12th Grade / High School Percentage (%)</label>
                <input type="number" step="0.01" name="marks12th" placeholder="e.g. 85.5" min="0" max="100" required>

                <button type="submit">Submit Application</button>
            </form>
        </div>
    </main>
</body>
</html>
